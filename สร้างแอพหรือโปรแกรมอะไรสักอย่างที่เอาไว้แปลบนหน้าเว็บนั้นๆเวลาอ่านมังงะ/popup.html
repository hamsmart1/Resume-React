<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-card: rgba(22, 22, 22, 0.9);
      --text-main: #f5f5f7;
      --text-muted: #86868b;
      --border-color: rgba(255, 255, 255, 0.08);
      --accent-white: #ffffff;
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 1.5rem;
      background-color: var(--bg-primary);
      color: var(--text-main);
      font-family: var(--font-family);
      box-sizing: border-box;
    }

    h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 1.25rem;
      text-align: center;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 40%, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    select, input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-main);
      padding: 0.6rem;
      font-size: 0.85rem;
      outline: none;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    select:focus, input:focus {
      border-color: var(--accent-white);
      background: rgba(255, 255, 255, 0.05);
    }

    .hidden {
      display: none;
    }

    .btn-activate {
      width: 100%;
      background: var(--accent-white);
      color: #000000;
      border: 1px solid var(--accent-white);
      border-radius: 10px;
      padding: 0.75rem;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 1.25rem;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
    }

    .btn-activate:hover {
      background: transparent;
      color: var(--accent-white);
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.2);
    }

    .status-text {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.75rem;
    }
  </style>
</head>
<body>
  <h2>Manga Translator</h2>
  
  <div class="form-group">
    <label for="sourceLang">Source Language / ภาษาต้นทาง</label>
    <select id="sourceLang">
      <option value="ja">Japanese / ญี่ปุ่น (縦書き・横書き)</option>
      <option value="en">English / อังกฤษ</option>
      <option value="ko">Korean / เกาหลี</option>
      <option value="zh">Chinese / จีน</option>
    </select>
  </div>

  <div class="form-group">
    <label for="ocrEngine">OCR Engine</label>
    <select id="ocrEngine">
      <option value="local">Tesseract.js (Free / ในเครื่อง)</option>
      <option value="google">Google Cloud Vision (API Key)</option>
    </select>
  </div>

  <div id="googleKeyGroup" class="form-group hidden">
    <label for="googleKey">Google Cloud API Key</label>
    <input type="password" id="googleKey" placeholder="Enter API Key">
  </div>

  <div class="form-group">
    <label for="translateEngine">Translation Engine</label>
    <select id="translateEngine">
      <option value="free">Google Translate (Free)</option>
      <option value="gemini">Gemini AI (API Key)</option>
    </select>
  </div>

  <div id="geminiKeyGroup" class="form-group hidden">
    <label for="geminiKey">Gemini API Key</label>
    <input type="password" id="geminiKey" placeholder="AIzaSy...">
  </div>

  <button id="btnActivate" class="btn-activate">Select Area / เริ่มครอบตัด</button>
  
  <div id="status" class="status-text">Click to activate selection tool.</div>

  <script src="popup.js"></script>
</body>
</html>
